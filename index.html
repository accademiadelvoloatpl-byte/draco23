<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>PPL - Draco 23</title>
<link rel="icon" type="image/png" href="https://www.accademiadelvolocepu.it/images/layout/favicon.ico">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- stesso CSS del file B, identico -->
<style>
	/* -------------------------------------------------
	COLORI E VARIABILI
	------------------------------------------------- */
	:root {
	  --blue:        #0B4DA2;
	  --blue-dark:   #083a78;
	  --blue-light:  #eaf2ff;
	  --ok:          #1a9f49;
	  --err:         #c62828;
	  --text:        #1f2a37;
	  --muted:       #667085;
	  --bg:          #f5f7fb;
	  --card:        #ffffff;
	  --border:      #d9e1f2;
	}

	/* -------------------------------------------------
	   BASE
	------------------------------------------------- */
	body {
	  margin: 0;
	  background: var(--bg);
	  color: var(--text);
	  font: 16px/1.45 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
	}

	.wrap {
	  max-width: 1000px;
	  margin: 24px auto;
	  padding: 0 16px;
	}

	/* -------------------------------------------------
	   HEADER
	------------------------------------------------- */
	header {
	  background: linear-gradient(90deg, var(--blue), var(--blue-dark));
	  color: #fff;
	  border-radius: 12px;
	  padding: 6px 24px;
	  box-shadow: 0 6px 18px rgba(0,0,0,.08);
	}

	header h1 {
	  margin: 0 0 6px;
	  font-weight: 700;
	  font-size: 22px;
	}

	/* -------------------------------------------------
	   CARD / CONTAINER
	------------------------------------------------- */
	.card {
	  background: var(--card);
	  border: 1px solid var(--border);
	  border-radius: 12px;
	  padding: 20px;
	  margin-top: 8px;
	}
	
	.wrap {
	  max-width: 1000px;
	  margin: 8px auto;
	  padding: 0 8px;
	}	
	
	#menu h2 {
	  margin-top: 0px;
	}

	/* -------------------------------------------------
	   FORM / LAYOUT
	------------------------------------------------- */
	.row {
	  display: flex;
	  gap: 10px;
	  flex-wrap: wrap;
	  align-items: center;
	}

	label {
	  font-size: 14px;
	  color: var(--muted);
	}

	input,
	select {
	  padding: 8px 10px;
	  border: 1px solid var(--border);
	  border-radius: 8px;
	}

	/* -------------------------------------------------
	   BUTTONS
	------------------------------------------------- */
	button {
	  background: var(--blue);
	  color: #fff;
	  border: none;
	  border-radius: 10px;
	  padding: 10px 16px;
	  font-weight: 600;
	  cursor: pointer;
	  box-shadow: 0 3px 0 0 var(--blue-dark);
	}

	button.secondary {
	  background: #fff;
	  color: var(--blue);
	  border: 1px solid var(--blue);
	  box-shadow: none;
	}

	button:active {
	  transform: translateY(1px);
	}

	/* -------------------------------------------------
	   DOMANDE / RISPOSTE
	------------------------------------------------- */
	.question {
	  border: 1px solid var(--border);
	  border-radius: 10px;
	  padding: 16px;
	  margin-top: 14px;
	  background: #fff;
	}

	/* Domande NON in grassetto + più piccole */
	#qtext {
	  font-size: 14px;
	  font-weight: 400;
	  white-space: pre-line;
	}

	.answers {
	  display: grid;
	  gap: 12px;
	  margin-top: 14px;
	}

	.answer {
	  display: flex;
	  gap: 10px;
	  border: 1px solid var(--border);
	  padding: 10px;
	  border-radius: 8px;
	  background: #fcfdff;
	}

	/* -------------------------------------------------
	   PROGRESS BAR
	------------------------------------------------- */
	.progress {
	  height: 8px;
	  background: #eef1f7;
	  border-radius: 999px;
	  overflow: hidden;
	  margin-top: 8px;
	}

	.bar {
	  height: 100%;
	  background: var(--blue);
	  width: 0%;
	}

	/* -------------------------------------------------
	   ELEMENTI EXTRA
	------------------------------------------------- */
	.pill {
	  display: inline-block;
	  padding: 4px 10px;
	  border-radius: 999px;
	  background: var(--blue-light);
	  color: var(--blue-dark);
	  font-size: 12px;
	  font-weight: 600;
	}
	
	#examTitle {
	  font-size: 18px;
	  font-weight: 600;
	  margin: 0;
	}

	.hidden {
	  display: none !important;
	}

	.muted {
	  color: var(--muted);
	}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Simulatore Esame PPL</h1>
</header>

<!-- (il resto del markup è identico al File B: menu, exam, result) -->
<section id="menu" class="card">
  <h2>Seleziona modalità</h2>

  <h3 style="margin-top:0.8rem">A) Simulazione PPL completa (proporzionale)</h3>
  <div class="row">
    <label for="fullCount">Domande totali:</label>
    <input id="fullCount" type="number" min="10" max="240" value="30" style="width:90px">
    <label for="fullTimer">Timer (min):</label>
    <input id="fullTimer" type="number" min="0" max="180" value="45" style="width:90px" title="0 = nessun timer">
    <button onclick="startFullExam()">Avvia simulazione completa</button>
  </div>

  <h3 style="margin-top:1.6rem">B) Seleziona materia</h3>
  <div class="row">
    <label for="subjectSel">Materia:</label>
    <select id="subjectSel">
	  <option 			value="ALW">ALW – Regolamentazione Aeronautica</option> 		<!-- OK -->
	  <option 			value="POF">POF – Principi del Volo</option>  					<!-- OK -->
	  <option 			value="MET">MET – Meteorologia</option>							<!-- IMMAGINI -->
	  <option 			value="AGK">AGK – Nozioni Generali Aeromobili</option>       	<!-- OK -->
	  <option 			value="OPR">OPR – Procedure Operative</option> 					<!-- OK -->
	  <option 			value="COM">COM – Comunicazioni</option>						<!-- OK --> -
	  <option   		value="HPL">HPL – Prestazioni e Limitazioni Umane</option>		<!-- OK --> -
	  <option selected	value="NAV">NAV – Navigazione</option>							<!-- OK --> 		
	  <option 			value="FPP">FPP – Prestazioni in Volo e Pianificazione</option> <!-- OK --> -
	  
      <!--
      <option 			value="ENF">ENF – Fonia Inglese</option>
	  -->
    </select>
  </div>

  <div class="row" style="margin-top:8px">
    <button onclick="startSubjectOrdered()">Studio (ordine numerico)</button>
    <button onclick="startSubjectRandom()">Studio (ordine casuale)</button>
  </div>

  <div class="row" style="margin-top:8px">
    <label for="subExamCount">Mini‑Esame domande:</label>
    <input id="subExamCount" type="number" min="5" max="120" value="20" style="width:90px">
    <label for="subExamTimer">Timer (min):</label>
    <input id="subExamTimer" type="number" min="0" max="120" value="25" style="width:90px" title="0 = nessun timer">
    <button onclick="startSubjectExam()">Avvia mini‑esame materia</button>
  </div>
</section>

<section id="exam" class="card hidden">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
    <div style="flex:1 1 auto;min-width:260px">
      <h2 id="examTitle"></h2>
      <div class="progress"><div id="bar" class="bar"></div></div>
    </div>
    <span id="counter" class="pill"></span>
  </div>
	<div class="question">
	  <h3 id="qtext"></h3>

	  <div id="qimage" style="margin:10px 0;text-align:center;"></div>

	  <div id="answers" class="answers"></div>
	  <div id="feedback"></div>
	</div>
	
	
	<div class="row" style="margin-bottom:12px; gap:8px; align-items:center;">
	  <label class="muted">Vai alla domanda n°</label>
	  <input id="gotoInput" type="number" min="1" style="width:90px">
	  <button class="secondary" onclick="goToQuestionByNumber()">Vai</button>
	</div>

  <div class="row" style="margin-top:16px;justify-content:flex-start">
	<button id="btnShow" onclick="checkCurrent()">Check/Next</button>
	<!-- <button class="btnShow"  onclick="checkCurrent()">Check/Next</button> -->	
	<button class="secondary" onclick="next()">Next</button>
	<button class="secondary" onclick="prev()">Previous</button>
	<button id="btnCheck" class="secondary" onclick="checkCurrent()" style="display:none;">Controlla risposta </button>

	<div style="flex:1 1 auto"></div>
	<button class="secondary" onclick="finish()">Finish</button>
	<button id="btnNew" class="secondary" onclick="reload()">Menu</button>
  </div>
  <h3 id="timer" class="hidden"></h3>
</section>

<section id="result" class="card hidden">
  <h2>Risultato finale</h2>
  <p id="score"></p>
  <div id="review"></div>
  <div class="row" style="margin-top:16px">
    <button onclick="reload()">Torna al menù</button>
    <button id="btnRepeatWrong" class="secondary hidden" onclick="repeatWrong()">Ripeti solo le sbagliate</button>
  </div>
</section>

// ====== motore identico al file B (stesse funzioni) ======
const PASS_MARK=75;
const IMG_BASE_FILE = "";
const IMG_BASE_WEB = "https://www.quizair.it/quizimg/";
const IMG_BASE = "https://www.quizair.it/quizimg/";
let quiz=[], idx=0, answers=[], allowInstantCheck=false, timerOn=false, timeLeft=0;

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }
function sampleArray(arr,k){ if(k>=arr.length) return [...arr]; const t=[...arr]; shuffle(t); return t.slice(0,k); }
function allSubjects(){ return Object.keys(DB); }
function totalCount(){ return allSubjects().reduce((acc,s)=>acc+DB[s].length,0); }
function allocateProportional(counts,total){
  const sum=counts.reduce((a,b)=>a+b,0); if(sum===0) return counts.map(_=>0);
  const exact=counts.map(c=>c/sum*total), floor=exact.map(x=>Math.floor(x));
  let rem=total-floor.reduce((a,b)=>a+b,0);
  const frac=exact.map((x,i)=>({i,f:x-floor[i]})).sort((a,b)=>b.f-a.f);
  for(let k=0;k<frac.length && rem>0;k++){ floor[frac[k].i]++; rem--; } return floor;
}
function buildSubjectOrdered(sub){ return [...(DB[sub]||[])].sort((a,b)=>(a.number??0)-(b.number??0)); }
function buildSubjectRandom(sub){ const a=[...(DB[sub]||[])]; shuffle(a); return a; }
function buildSubjectExam(sub,n){ const a=DB[sub]||[]; return sampleArray(a, Math.min(n,a.length)); }
function buildFullExam(total){
  const subs=allSubjects(), counts=subs.map(s=>DB[s].length), quotas=allocateProportional(counts,total);
  let out=[]; subs.forEach((s,i)=>{ const k=quotas[i]; if(k>0 && DB[s].length>0) out=out.concat(sampleArray(DB[s], Math.min(k,DB[s].length))); });
  shuffle(out); return out;
}
function startFullExam(){
  const n=Math.max(5, +document.getElementById('fullCount').value || 30);
  const t=Math.max(0, +document.getElementById('fullTimer').value || 45);
  quiz=buildFullExam(n); allowInstantCheck=false; timerOn=t>0; timeLeft=t*60;
  begin(`Simulazione PPL completa – ${n} domande${t>0?` – ${t} min`:''}`); if(timerOn) startTimer();
}
function currentSubject(){ return document.getElementById('subjectSel').value; }
function startSubjectOrdered(){ const s=currentSubject(); quiz=buildSubjectOrdered(s); allowInstantCheck=true; timerOn=false; begin(`${s} – Studio (ordine numerico)`); }
function startSubjectRandom(){ const s=currentSubject(); quiz=buildSubjectRandom(s); allowInstantCheck=true; timerOn=false; begin(`${s} – Studio (ordine casuale)`); }
function startSubjectExam(){ const s=currentSubject(); const n=Math.max(5,+document.getElementById('subExamCount').value||20); const t=Math.max(0,+document.getElementById('subExamTimer').value||25); quiz=buildSubjectExam(s,n); allowInstantCheck=false; timerOn=t>0; timeLeft=t*60; begin(`${s} – Mini‑Esame (${n} domande${t>0?` – ${t} min`:''})`); if(timerOn) startTimer(); }
function begin(title){
  idx=0; answers=new Array(quiz.length).fill(null);
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("exam").classList.remove("hidden");
  document.getElementById("examTitle").textContent=title;
  document.getElementById("timer").classList.toggle("hidden",!timerOn);
  document.getElementById("btnCheck").classList.toggle("hidden",!allowInstantCheck);
  document.getElementById("btnShow").classList.toggle("hidden",!allowInstantCheck);
  
    
  render();
}
function startTimer(){ const t=document.getElementById("timer"); (function tick(){ if(!timerOn) return; const m=Math.floor(timeLeft/60), s=timeLeft%60; t.textContent=`Tempo residuo: ${m}m ${s}s`; if(timeLeft<=0){ finish(); return; } timeLeft--; setTimeout(tick,1000); })(); }

function render(){
  if(!quiz.length) return;
  const fb=document.getElementById("feedback"); fb.textContent=""; fb.style.color="";
  const q=quiz[idx]; document.getElementById("qtext").textContent=`${q.number??(idx+1)}) ${q.question||'(domanda mancante)'}`;
  // ===== gestione immagine domanda =====
  const imgBox = document.getElementById("qimage");
  if (q.image) { imgBox.innerHTML = `<img src="${IMG_BASE}${q.image}" style="max-width:100%; max-height:300px; border-radius:8px;">`;} else {imgBox.innerHTML = "";}  
  document.getElementById("counter").textContent=`Domanda ${idx+1}/${quiz.length}`;
  const box=document.getElementById("answers"); box.innerHTML="";
  (q.options||[]).forEach((opt,i)=>{ const div=document.createElement("div"); div.className="answer"; div.innerHTML=`<label><input type="radio" name="a" value="${i}" ${answers[idx]===i?'checked':''}> <b>${String.fromCharCode(65+i)})</b> ${opt}</label>`; div.onclick=()=>{answers[idx]=i}; box.appendChild(div); });
  document.getElementById("bar").style.width=((idx+1)/quiz.length*100)+"%";
}

function reload() { if (confirm("Confermi di voler tornare al menù principale?")) { location.reload(); } else { console.log("Operazione annullata"); } }
function finish() { if (confirm("Confermi di voler terminare la sezione di studio?")) { completed(); } else { console.log("Operazione annullata"); } }

function next(){ if(idx<quiz.length-1){ idx++; render(); } }
function prev(){ if(idx>0){ idx--; render(); } }
function checkCurrent_Old(){ const fb=document.getElementById("feedback"); const q=quiz[idx]; const sel=answers[idx]; if(sel==null){ fb.textContent="Seleziona una risposta."; fb.style.color="#8a6d3b"; return; } if(sel===q.correct){ fb.textContent="✔ Risposta corretta"; fb.style.color="var(--ok)"; } else { const right=`${String.fromCharCode(65+(q.correct??0))}) ${q.options?.[q.correct??0]||''}`; fb.innerHTML=`✘ Risposta errata. Corretta: <strong>${right}</strong>`; fb.style.color="var(--err)"; } }
function checkCurrent_Correct(){ const fb=document.getElementById("feedback"); const q=quiz[idx]; const sel=answers[idx]; if(sel==null) { const right=`${String.fromCharCode(65+(q.correct??0))}) ${q.options?.[q.correct??0]||''}`; fb.innerHTML=`✘ Risposta errata. Corretta: <strong>${right}</strong>`; fb.style.color="var(--err)";return; } if(sel===q.correct){ fb.textContent="✔ Risposta corretta"; fb.style.color="var(--ok)"; } else { const right=`${String.fromCharCode(65+(q.correct??0))}) ${q.options?.[q.correct??0]||''}`; fb.innerHTML=`✘ Risposta errata. Corretta: <strong>${right}</strong>`; fb.style.color="var(--err)"; } }
function checkCurrent() { const fb=document.getElementById("feedback"); const q=quiz[idx]; const sel=answers[idx]; if(fb.textContent!="") { if(idx<quiz.length-1) { idx++; render(); } return; } if(sel==null) { const right=`${String.fromCharCode(65+(q.correct??0))}) ${q.options?.[q.correct??0]||''}`; fb.innerHTML=`✘ Risposta errata. Corretta: <strong>${right}</strong>`; fb.style.color="var(--err)"; return; } if(sel===q.correct) { fb.textContent="✔ Risposta corretta"; fb.style.color="var(--ok)"; } else { const right=`${String.fromCharCode(65+(q.correct??0))}) ${q.options?.[q.correct??0]||''}`; fb.innerHTML=`✘ Risposta errata. Corretta: <strong>${right}</strong>`; fb.style.color="var(--err)"; } }
function showSolution(){ const fb=document.getElementById("feedback"); const q=quiz[idx]; const right=`${String.fromCharCode(65+(q.correct??0))}) ${q.options?.[q.correct??0]||''}`; fb.innerHTML=`✔ Soluzione: <strong>${right}</strong>`; fb.style.color="var(--ok)"; }
function completed(){
  timerOn=false; document.getElementById("exam").classList.add("hidden"); document.getElementById("result").classList.remove("hidden");
  let correct=0; const wrongList=[]; quiz.forEach((q,i)=>{ if(answers[i]===q.correct) correct++; else wrongList.push({ n:q.number??(i+1), q:q.question||'', your: (answers[i]!=null? `${String.fromCharCode(65+answers[i])}) ${q.options?.[answers[i]]||''}` : "—"), right:`${String.fromCharCode(65+(q.correct??0))}) ${q.options?.[q.correct??0]||''}` }); });
  const total=quiz.length, pct=Math.round(correct/total*100), passed=pct>=75;
  document.getElementById("score").innerHTML = `<b>Punteggio:</b> ${correct}/${total} (${pct}%) – ` + (passed? `<span style="color:var(--ok)">SUPERATO ✓</span>`:`<span style="color:var(--err)">NON superato ✗</span>`) + ` – <span class="muted">Soglia: 75%</span>`;
  const rev=document.getElementById("review"); rev.innerHTML="";
  window.__LAST_WRONG__ = wrongList.map(w=>{ for(const s of allSubjects()){ const hit=DB[s].find(d=>d.number===w.n && d.question===w.q); if(hit) return {...hit}; } return null; }).filter(Boolean);
  const btnRepeat=document.getElementById("btnRepeatWrong"); if(window.__LAST_WRONG__.length>0) btnRepeat.classList.remove("hidden"); else btnRepeat.classList.add("hidden");
  if(!wrongList.length){ rev.innerHTML=`<p style="color:var(--ok);font-weight:600">Nessun errore! Ottimo lavoro.</p>`; return; }
  wrongList.sort((a,b)=>a.n-b.n).forEach(w=>{ const d=document.createElement("div"); d.style.margin="10px 0"; d.innerHTML=`<b>Domanda ${w.n}</b><br>${w.q}<br><span style="color:var(--err)">Tua:</span> ${w.your}<br><span style="color:var(--ok)">Corretta:</span> ${w.right}<div style="height:1px;background:var(--border);margin-top:10px"></div>`; rev.appendChild(d); });
}
function repeatWrong(){
  if(!window.__LAST_WRONG__ || window.__LAST_WRONG__.length===0){ alert("Nessuna domanda da ripetere."); return; }
  quiz=[...window.__LAST_WRONG__]; answers=new Array(quiz.length).fill(null); idx=0; allowInstantCheck=true; timerOn=false;
  document.getElementById("result").classList.add("hidden"); document.getElementById("exam").classList.remove("hidden");
  document.getElementById("examTitle").textContent = "Ripeti solo le sbagliate"; document.getElementById("timer").classList.add("hidden");
  document.getElementById("btnCheck").classList.remove("hidden"); document.getElementById("btnShow").classList.remove("hidden"); render();
}

function goToQuestionByNumber() {
  const val = parseInt(document.getElementById("gotoInput").value);
  if (isNaN(val)) return;

  // cerca l'indice della domanda con quel numero
  const targetIndex = quiz.findIndex(q => q.number === val);

  if (targetIndex === -1) {
    alert("Domanda numero " + val + " non presente in questo test");
    return;
  }

  idx = targetIndex;
  render();
  updateQuestionNav();
}
	
document.addEventListener("DOMContentLoaded", function () {
  const gotoInput = document.getElementById("gotoInput");
  if (!gotoInput) return;

  gotoInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      goToQuestionByNumber();
    }
  });
});
